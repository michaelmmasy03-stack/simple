<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Love Me?</title>
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top, #1f1f2e, #0b0b14 70%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .question-box {
      text-align: center;
      position: relative;
      z-index: 5;
      transition: 0.4s ease;
    }

    .question-box h1 {
      font-size: 3rem;
      margin-bottom: 25px;
      text-shadow: 0 0 20px rgba(255, 80, 130, 0.4);
    }

    .buttons {
      position: relative;
      width: 320px;
      height: 120px;
      margin: 0 auto;
    }

    button {
      border: none;
      outline: none;
      padding: 16px 34px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.25s ease;
      position: absolute;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }

    #yesBtn {
      left: 55px;
      top: 25px;
      background: linear-gradient(135deg, #ff4f8b, #ff2d6f);
      color: white;
    }

    #yesBtn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px rgba(255, 70, 130, 0.45);
    }

    #noBtn {
      left: 180px;
      top: 25px;
      background: white;
      color: #ff2d6f;
    }

    #noBtn:hover {
      background: #ffe6ef;
    }

    .result {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      opacity: 0;
    }

    .love-text {
      margin-top: 20px;
      font-size: 2.4rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: center;
      text-shadow: 0 0 18px rgba(255, 80, 130, 0.35);
    }

    .heart-wrap {
      position: relative;
      width: 430px;
      height: 430px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .pulse-bg {
      position: absolute;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 70, 130, 0.28), transparent 70%);
      filter: blur(15px);
      z-index: -1;
      animation: pulseBg 2s infinite ease-in-out;
    }

    @keyframes pulseBg {
      0%, 100% {
        transform: scale(0.9);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 0 20px rgba(255, 60, 120, 0.35))
              drop-shadow(0 0 50px rgba(255, 60, 120, 0.2));
    }

    .heart-outline {
      fill: none;
      stroke: rgba(255, 255, 255, 0.25);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .heart-fill {
      fill: url(#heartGradient);
      opacity: 0.95;
      transform-origin: center;
      filter: drop-shadow(0 0 18px rgba(255, 65, 129, 0.5));
    }

    .spark {
      fill: #ffd7e6;
      opacity: 0.9;
    }

    .glow-ring {
      fill: none;
      stroke: rgba(255, 90, 150, 0.25);
      stroke-width: 4;
    }

    .hint {
      margin-top: 12px;
      font-size: 0.95rem;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      .question-box h1 {
        font-size: 2rem;
      }

      .buttons {
        width: 280px;
      }

      #yesBtn {
        left: 35px;
      }

      #noBtn {
        left: 160px;
      }

      .heart-wrap {
        width: 320px;
        height: 320px;
      }

      .love-text {
        font-size: 1.7rem;
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>

  <div class="screen">
    <div class="question-box" id="questionBox">
      <h1>Do you love me? ❤️</h1>

      <div class="buttons" id="buttonArea">
        <button id="yesBtn">YES</button>
        <button id="noBtn">NO</button>
      </div>

      <div class="hint">Choose carefully 😏</div>
    </div>

    <div class="result" id="resultScreen">
      <div class="heart-wrap">
        <div class="pulse-bg"></div>

        <svg viewBox="0 0 600 600" id="heartSvg">
          <defs>
            <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff7aa8" />
              <stop offset="50%" stop-color="#ff3d7f" />
              <stop offset="100%" stop-color="#d81b60" />
            </linearGradient>
          </defs>

          <circle class="glow-ring" cx="300" cy="300" r="110"></circle>
          <circle class="glow-ring" cx="300" cy="300" r="150"></circle>

          <path
            id="heartPath"
            class="heart-fill"
            d="M300 500
               C 120 390, 70 230, 150 150
               C 210 90, 290 120, 300 190
               C 310 120, 390 90, 450 150
               C 530 230, 480 390, 300 500 Z"
          />

          <path
            id="heartOutline"
            class="heart-outline"
            d="M300 500
               C 120 390, 70 230, 150 150
               C 210 90, 290 120, 300 190
               C 310 120, 390 90, 450 150
               C 530 230, 480 390, 300 500 Z"
          />
        </svg>
      </div>

      <div class="love-text">I love you too ❤️</div>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const buttonArea = document.getElementById("buttonArea");
    const questionBox = document.getElementById("questionBox");
    const resultScreen = document.getElementById("resultScreen");

    let moveCount = 0;

    function moveNoButton() {
      const areaRect = buttonArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = areaRect.width - btnRect.width;
      const maxY = areaRect.height - btnRect.height;

      let randomX = Math.floor(Math.random() * maxX);
      let randomY = Math.floor(Math.random() * maxY);

      // keep some distance from YES button area
      if (randomX < 120) randomX += 100;

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";

      moveCount++;

      gsap.fromTo(noBtn,
        { scale: 0.9, rotation: -8 },
        { scale: 1, rotation: 0, duration: 0.25, ease: "back.out(2)" }
      );
    }

    // Make NO run away on hover and click/touch
    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNoButton();
    });
    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNoButton();
    }, { passive: false });

    yesBtn.addEventListener("click", () => {
      gsap.to(questionBox, {
        opacity: 0,
        scale: 0.9,
        duration: 0.5,
        ease: "power2.inOut",
        onComplete: () => {
          questionBox.style.display = "none";
          resultScreen.style.display = "flex";

          gsap.to(resultScreen, {
            opacity: 1,
            duration: 0.8,
            ease: "power2.out"
          });

          startHeartAnimation();
        }
      });
    });

    function startHeartAnimation() {
      const svg = document.getElementById("heartSvg");
      const heart = document.getElementById("heartPath");
      const outline = document.getElementById("heartOutline");

      // heartbeat
      gsap.timeline({ repeat: -1, repeatDelay: 0.15 })
        .to(heart, {
          scale: 1.08,
          duration: 0.22,
          ease: "power2.out",
          transformOrigin: "50% 50%"
        })
        .to(heart, {
          scale: 0.96,
          duration: 0.18,
          ease: "power2.inOut"
        })
        .to(heart, {
          scale: 1.12,
          duration: 0.22,
          ease: "power2.out"
        })
        .to(heart, {
          scale: 1,
          duration: 0.35,
          ease: "elastic.out(1, 0.45)"
        });

      // outline draw
      const length = outline.getTotalLength();
      outline.style.strokeDasharray = length;
      outline.style.strokeDashoffset = length;

      gsap.to(outline, {
        strokeDashoffset: 0,
        duration: 2.2,
        ease: "power2.out"
      });

      // glow rings
      gsap.to(".glow-ring", {
        scale: 1.15,
        opacity: 0.05,
        duration: 1.5,
        transformOrigin: "50% 50%",
        stagger: {
          each: 0.25,
          repeat: -1,
          yoyo: true
        }
      });

      // floating motion
      gsap.to(svg, {
        y: -8,
        duration: 2.2,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut"
      });

      // spark generator
      function createSpark() {
        const ns = "http://www.w3.org/2000/svg";
        const spark = document.createElementNS(ns, "circle");

        const angle = Math.random() * Math.PI * 2;
        const radius = 80 + Math.random() * 80;
        const cx = 300 + Math.cos(angle) * radius;
        const cy = 280 + Math.sin(angle) * radius;

        spark.setAttribute("cx", cx);
        spark.setAttribute("cy", cy);
        spark.setAttribute("r", 3 + Math.random() * 3);
        spark.setAttribute("class", "spark");

        svg.appendChild(spark);

        gsap.fromTo(
          spark,
          {
            scale: 0,
            opacity: 0.9
          },
          {
            y: -20 - Math.random() * 40,
            x: (Math.random() - 0.5) * 30,
            scale: 1.8,
            opacity: 0,
            duration: 1.6 + Math.random() * 1.2,
            ease: "power1.out",
            onComplete: () => spark.remove()
          }
        );
      }

      setInterval(createSpark, 180);

      gsap.from(".love-text", {
        y: 25,
        opacity: 0,
        duration: 1,
        delay: 0.2,
        ease: "back.out(1.7)"
      });
    }
  </script>
</body>
</html>
